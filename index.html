<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="D&D Map Navigation Simulator - Plan routes, manage squads, and simulate travel.">
    <meta name="theme-color" content="#0d0f12">
    <meta name="format-detection" content="telephone=no">
    <title>Eval Maa - D&D Navigator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="auth.js"></script>
    <script>
        // Если уже вошел - перекидываем в дашборд
        if (AuthService.checkSession()) window.location.href = 'dashboard.html';
    </script>
</head>
<body class="bg-[#07090e] h-screen flex items-center justify-center">
    <div class="bg-[#11141a] p-8 rounded-2xl border border-slate-800 w-96 shadow-2xl">
        <h1 class="text-white text-2xl font-bold mb-6">Вход в систему Eval Maa</h1>
        <input id="user" type="text" placeholder="Имя искателя" class="w-full bg-[#0d0f12] p-3 rounded-lg border border-slate-700 text-white mb-4">
        <button onclick="login()" class="w-full bg-amber-500 hover:bg-amber-600 text-black font-bold py-3 rounded-lg transition-all">
            Войти в систему
        </button>
    </div>

    <script>
        function login() {
            const name = document.getElementById('user').value;
            if(name) {
                AuthService.setSession(name);
                window.location.href = 'dashboard.html';
            }
        }
    </script>
</body>
</html>
